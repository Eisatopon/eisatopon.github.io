<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Πώς λειτουργεί το Portify</title>

<style>
body {
    margin:0;
    font-family: system-ui, sans-serif;
    background: linear-gradient(135deg,#020617,#0f172a);
    color: white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container {
    max-width:600px;
    padding:2rem;
    text-align:center;
}

h1 {
    font-size:2.2rem;
    margin-bottom:2rem;
    background: linear-gradient(90deg,#fff,#a5b4fc);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.step {
    margin-bottom:1.8rem;
    padding:1.2rem;
    border-radius:14px;
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
}

.step strong {
    color:#60a5fa;
    font-size:1.1rem;
}

.example {
    opacity:0.7;
    font-size:0.9rem;
    margin-top:6px;
}

.footer {
    margin-top:2rem;
    opacity:0.5;
    font-size:0.9rem;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Πώς λειτουργεί</h1>

<div class="step">
<strong>1. Πληκτρολόγησε</strong>
<div class="example">youtube cats · maps athens · καιρός</div>
</div>

<div class="step">
<strong>2. Πάτα Enter</strong>
<div class="example">Πηγαίνεις άμεσα εκεί που θέλεις</div>
</div>

<div class="step">
<strong>3. Πρόσθεσε sites</strong>
<div class="example">γράψε netflix.com → Προσθήκη</div>
</div>

<div class="step">
<strong>4. Όλα σε ένα σημείο</strong>
<div class="example">το internet σου, οργανωμένο</div>
</div>

<div class="footer">
Portify – Your internet, one place
</div>

</div>

</body>
</html>
