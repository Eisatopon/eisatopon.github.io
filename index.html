<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portify – Your Internet, Perfected</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2322c55e'/%3E%3Cstop offset='50%25' stop-color='%233b82f6'/%3E%3Cstop offset='100%25' stop-color='%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='512' height='512' rx='100' fill='url(%23g)'/%3E%3Ctext x='50%25' y='68%25' font-size='260' text-anchor='middle' fill='white' font-weight='800'%3EP%3C/text%3E%3C/svg%3E">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <header class="header">
        <div class="header-inner">
            <div class="logo-container">
                <div class="logo-inner">P</div>
            </div>
            <div class="brand-text">
                <h1>Portify</h1>
                <p>Your internet, perfected</p>
            </div>
        </div>
    </header>

    <!-- SEARCH -->
    <div class="search-container">
        <div class="search-wrapper">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input 
                type="text" 
                class="search-input" 
                id="searchInput" 
                placeholder="🔍 Πού θέλεις να πας σήμερα;"
                autocomplete="off"
            >
        </div>
    </div>

    <!-- SMART ADD -->
    <section class="section">
        <h2 class="section-title">✨ Έξυπνη Προσθήκη</h2>
        <div class="smart-form">
            <input 
                type="text" 
                id="smartInput" 
                class="smart-input" 
                placeholder="netflix.com ή youtube music"
            >
            <div class="form-row">
                <select id="customCategory" class="form-select">
                    <option value="other">📁 Άλλο</option>
                    <option value="news">📰 Ειδήσεις</option>
                    <option value="sports">⚽ Αθλητικά</option>
                    <option value="work">💼 Εργασία</option>
                    <option value="entertainment">🎬 Ψυχαγωγία</option>
                </select>
                <button id="addBtn" class="btn btn-primary">+ Προσθήκη</button>
            </div>
        </div>
    </section>

    <!-- MY BOOKMARKS -->
    <section class="section">
        <h2 class="section-title">⭐ Τα αγαπημένα μου</h2>
        <div class="grid" id="favoritesGrid"></div>
    </section>

    <!-- TRENDING -->
    <section class="section">
        <h2 class="section-title">🔥 Δημοφιλή</h2>
        <div class="grid" id="trendingGrid"></div>
    </section>

    <!-- GREEK SITES -->
    <section class="section">
        <h2 class="section-title">🇬🇷 Ελληνικά</h2>
        <div class="grid" id="greekGrid"></div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <p>Portify © 2026 - Your internet, perfected</p>
    </footer>

</div>

<script src="script.js"></script>
</body>
</html>
