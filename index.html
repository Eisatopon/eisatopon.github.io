<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portify – Your Internet, Perfected</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2322c55e'/%3E%3Cstop offset='50%25' stop-color='%233b82f6'/%3E%3Cstop offset='100%25' stop-color='%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='512' height='512' rx='100' fill='url(%23g)'/%3E%3Ctext x='50%25' y='68%25' font-size='260' text-anchor='middle' fill='white' font-weight='800'%3EP%3C/text%3E%3C/svg%3E">
</head>
<body>

<div class="main-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo-small">
            <div class="logo-inner">P</div>
        </div>
        <h2>Countries</h2>
        
        <div class="country-item active" data-country="greece">
            🇬🇷 Greece
        </div>
        <div class="country-item" data-country="usa">
            🇺🇸 USA
        </div>
        <div class="country-item" data-country="uk">
            🇬🇧 United Kingdom
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="content">

        <!-- HEADER -->
        <header class="header">
            <div class="header-inner">
                <div class="logo-container">
                    <div class="logo-inner">P</div>
                </div>
                <div class="brand-text">
                    <h1 id="page-title">Portify</h1>
                    <p>Your internet, perfected</p>
                </div>
            </div>
        </header>

        <!-- SEARCH -->
        <div class="search-container">
            <div class="search-wrapper">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Πού θέλεις να πας σήμερα;" autocomplete="off">
            </div>
        </div>

        <!-- SMART ADD -->
        <section class="section">
            <div class="section-header">
                <h2 class="section-title">✨ Έξυπνη Προσθήκη</h2>
            </div>
            <div class="smart-form">
                <div class="input-with-icon">
                    <span class="input-icon">🔗</span>
                    <input type="text" id="smartInput" class="smart-input" placeholder="netflix.com ή youtube music">
                </div>
                <div class="form-row">
                    <select id="customCategory" class="form-select">
                        <option value="other">📁 Άλλο</option>
                        <option value="news">📰 Ειδήσεις</option>
                        <option value="sports">⚽ Αθλητικά</option>
                        <option value="work">💼 Εργασία</option>
                        <option value="social">💬 Social</option>
                        <option value="shopping">🛒 Shopping</option>
                        <option value="entertainment">🎬 Ψυχαγωγία</option>
                        <option value="finance">💰 Οικονομικά</option>
                    </select>
                    <button id="addBtn" class="btn btn-primary" disabled>+ Προσθήκη</button>
                </div>
            </div>
        </section>

        <!-- MY BOOKMARKS -->
        <section class="section">
            <div class="section-header">
                <h2 class="section-title">⭐ Τα αγαπημένα μου</h2>
                <span id="myBookmarksCount" class="section-count">0 items</span>
            </div>
            <div class="grid" id="favoritesGrid"></div>
        </section>

        <!-- DYNAMIC SECTION -->
        <section class="section">
            <div class="section-header">
                <h2 class="section-title" id="dynamic-title">🔥 Δημοφιλή</h2>
            </div>
            <div class="grid" id="dynamicGrid"></div>
        </section>

        <!-- FOOTER -->
        <footer class="footer">
            <div class="footer-links">
                <a href="#" onclick="showShortcutsModal(); return false;">⌨️ Shortcuts</a>
                <a href="#" onclick="exportData(); return false;">📥 Export</a>
                <a href="#" onclick="importData(); return false;">📤 Import</a>
            </div>
            <p>Portify © 2026</p>
        </footer>
    </div>
</div>

<!-- Modals -->
<div id="toastContainer" class="toast-container"></div>
<div id="shortcutsModal" class="modal-overlay">...</div>

<script src="script.js"></script>
</body>
</html>
