<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portify – Your Internet, One Place</title>
    <meta name="description" content="Portify: Your internet in one place. Smart search, bookmarks και άμεση πρόσβαση παντού.">

    <!-- Portify v3.4 | 2026-03-28 -->

    <link rel="stylesheet" href="style.css?v=3.4">
    <link rel="icon" type="image/png" href="icons/icon128.png">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <header class="header">
        <div class="header-inner">
            <div class="logo-container">
                <div class="logo-inner">P</div>
            </div>
            <div class="brand-text">
                <h1>Portify</h1>
                <p>Your internet. One place.</p>
            </div>
        </div>
    </header>

    <!-- SEARCH -->
    <div class="search-container">
        <div class="search-wrapper">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input
                type="search"
                class="search-input"
                id="searchInput"
                placeholder="Πού θέλεις να πας σήμερα;"
                autocomplete="off"
                aria-label="Αναζήτηση bookmarks"
            >
        </div>
        <div class="ai-hints" aria-label="Παραδείγματα αναζήτησης">
            Δοκίμασε: <b>youtube cats</b> · <b>maps athens</b> · <b>weather</b> · <b>wiki AI</b>
        </div>
    </div>

    <!-- SMART ADD -->
    <section class="section" aria-labelledby="smart-add-title">
        <div class="section-header">
            <h2 class="section-title" id="smart-add-title">🚀 Έξυπνη Προσθήκη</h2>
        </div>

        <div class="smart-form">
            <div class="input-with-icon">
                <span class="input-icon" aria-hidden="true"></span>
                <input
                    type="text"
                    id="smartInput"
                    class="smart-input"
                    placeholder="netflix.com ή youtube music"
                    autocomplete="off"
                    aria-label="URL ή όνομα ιστοσελίδας"
                >
                <div id="inputStatus" aria-live="polite"></div>
            </div>

            <div class="form-row">
                <label for="customCategory" class="sr-only">Κατηγορία</label>
                <select id="customCategory" class="form-select">
                    <option value="other">📁 Άλλο</option>
                    <option value="news">📰 Ειδήσεις</option>
                    <option value="sports">⚽ Αθλητικά</option>
                    <option value="work">💼 Εργασία</option>
                    <option value="social">💬 Social</option>
                    <option value="shopping">🛒 Shopping</option>
                    <option value="entertainment">🎬 Ψυχαγωγία</option>
                    <option value="finance">💰 Οικονομικά</option>
                </select>

                <button id="addBtn" class="btn btn-primary" disabled aria-label="Προσθήκη bookmark">
                    + Προσθήκη
                </button>
            </div>

            <div id="previewCard" class="preview-card" aria-live="polite">
                <img id="previewIcon" src="" alt="" width="48" height="48">
                <div class="preview-info">
                    <div id="previewName" class="preview-name"></div>
                    <div id="previewUrl" class="preview-url"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- MY BOOKMARKS -->
    <section class="section" aria-labelledby="my-bookmarks-title">
        <div class="section-header">
            <h2 class="section-title" id="my-bookmarks-title">⭐ Τα αγαπημένα μου</h2>
            <span id="myBookmarksCount" class="section-count" aria-live="polite">0 items</span>
        </div>
        <div class="cat-filter-bar" id="categoryFilterBar" role="toolbar" aria-label="Φίλτρο κατηγορίας"></div>
        <div class="grid" id="favoritesGrid" role="list"></div>
    </section>

    <!-- RECENT VISITS -->
    <section class="section" id="recentSection" aria-labelledby="recent-title" style="display:none">
        <div class="section-header">
            <h2 class="section-title" id="recent-title">🕐 Πρόσφατα</h2>
        </div>
        <div class="grid" id="recentGrid" role="list"></div>
    </section>

    <!-- TRENDING -->
    <section class="section" aria-labelledby="trending-title">
        <div class="section-header">
            <h2 class="section-title" id="trending-title">🔥 Δημοφιλή</h2>
        </div>
        <div class="grid" id="trendingGrid" role="list"></div>
    </section>

    <!-- WORLD SITES (tabbed) -->
    <section class="section" aria-labelledby="world-title">
        <div class="section-header">
            <h2 class="section-title" id="world-title">🌍 Ανά Χώρα</h2>
        </div>
        <div class="country-tab-bar" id="countryTabBar" role="tablist" aria-label="Επιλογή χώρας"></div>
        <div class="grid" id="countryGrid" role="list"></div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-links">
            <button class="footer-btn" id="exportBtn">💾 Export</button>
            <button class="footer-btn" id="importBtn">📥 Import</button>
        </div>
        <p>Portify © 2026 - Your internet, one place</p>
        <p style="margin-top:0.4rem;font-size:0.8rem;opacity:0.4;">Created by <a href="https://www.eisatopon.gr" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">EisatoponAI</a></p>
    </footer>

</div>

<!-- TOAST CONTAINER -->
<div id="toastContainer" class="toast-container" role="status" aria-live="polite"></div>

<!-- EDIT MODAL -->
<div id="editModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
    <div class="modal">
        <h3 id="edit-modal-title">✏️ Επεξεργασία</h3>
        <form id="editForm">
            <input type="hidden" id="editIndex">
            <label for="editName" class="sr-only">Όνομα</label>
            <input type="text" id="editName" placeholder="Όνομα" required autocomplete="off">
            <label for="editUrl" class="sr-only">URL</label>
            <input type="url" id="editUrl" placeholder="URL" required>
            <label for="editCategory" class="sr-only">Κατηγορία</label>
            <select id="editCategory">
                <option value="other">📁 Άλλο</option>
                <option value="news">📰 Ειδήσεις</option>
                <option value="sports">⚽ Αθλητικά</option>
                <option value="work">💼 Εργασία</option>
                <option value="social">💬 Social</option>
                <option value="shopping">🛒 Shopping</option>
                <option value="entertainment">🎬 Ψυχαγωγία</option>
                <option value="finance">💰 Οικονομικά</option>
            </select>
            <div class="modal-buttons">
                <button type="button" id="cancelEditBtn">Ακύρωση</button>
                <button type="submit">Αποθήκευση</button>
            </div>
        </form>
    </div>
</div>

<!-- Visually hidden utility class for screen readers -->
<style>.sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }</style>

<script src="script.js?v=3.4"></script>
</body>
</html>
