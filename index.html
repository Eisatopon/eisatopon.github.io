<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Portify</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  margin: 0;
  color: white;
}

/* CONTAINER (FIX DESKTOP + MOBILE) */
.container{
  max-width: 900px;
  margin: auto;
  padding: 0 16px;
}

/* HEADER */
.header {
  padding: 25px 0;
}

.header-inner{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
}

/* LOGO */
.logo-box {
  width:36px;
  height:36px;
  border-radius:10px;
  background: linear-gradient(135deg,#22c55e,#3b82f6);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:18px;
  color:white;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 rgba(59,130,246,0.6); }
  50% { box-shadow: 0 0 12px rgba(59,130,246,0.8); }
  100% { box-shadow: 0 0 0 rgba(59,130,246,0.6); }
}

/* SEARCH */
.search {
  margin: 20px 0;
}

.search input {
  width: 100%;
  padding: 14px;
  border-radius: 20px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.08);
  color:white;
}

/* SECTIONS */
.section {
  padding: 20px 0;
}

.section h2 {
  margin-bottom: 15px;
  font-size: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 14px;
}

/* CARD */
.card {
  background: #1e293b;
  padding: 16px;
  border-radius: 16px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
}

.card img {
  width: 45px;
  height: 45px;
  margin-bottom: 10px;
  background: rgba(255,255,255,0.85);
  padding: 6px;
  border-radius: 10px;
}

.card:hover {
  transform: translateY(-3px);
  background: #334155;
}

/* ADD BOX */
.add-box{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.add-box input{
  width:100%;
}

.add-box button{
  width:100%;
  padding:12px;
  border-radius:14px;
}

/* LINK FIX */
.card a {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-decoration: none;
  color: white;
  width: 100%;
}

.card a:hover {
  color: white;
}

/* INPUT */
input {
  padding: 10px;
  border-radius: 10px;
  border: none;
}

/* BUTTON */
button {
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
}

.delete-btn {
  margin-top: 6px;
  font-size: 12px;
  background: #ef4444;
}

/* MOBILE EXTRA */
@media (max-width: 600px){
  .container{
    padding: 0 12px;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div class="header-inner">
    <div class="logo-box">P</div>
    <div>
      <div style="font-size:28px;font-weight:700;">Portify</div>
      <div style="font-size:13px;color:#94a3b8;">your internet in one place</div>
    </div>
  </div>
</div>

<div class="search">
<input type="text" placeholder="Αναζήτηση..." autofocus onkeydown="handleSearch(event,this.value)">
</div>

<div class="section">
<h2>🛠 Φτιάξε το δικό σου Portify</h2>

<div class="add-box">
<input id="customName" placeholder="Όνομα site">
<input id="customUrl" type="url" placeholder="Link">
<button onclick="addCustom()">Προσθήκη</button>
</div>

<div id="favorites" class="grid"></div>
</div>

<div class="section">
<h2>🔥 Trending</h2>
<div class="grid">
<a class="card" href="https://google.com" target="_blank">
<img src="https://www.google.com/s2/favicons?sz=64&domain=google.com">Google</a>
<a class="card" href="https://youtube.com" target="_blank">
<img src="https://www.google.com/s2/favicons?sz=64&domain=youtube.com">YouTube</a>
</div>
</div>

</div>

<script>
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

function getDomain(url){
  try{return new URL(url).hostname;}catch{return url;}
}

function renderFavorites(){
  const container=document.getElementById("favorites");
  container.innerHTML="";
  favorites.forEach((f,i)=>{
    const d=getDomain(f.url);
    container.innerHTML+=`
      <div class="card">
        <a href="${f.url}" target="_blank">
          <img src="https://www.google.com/s2/favicons?sz=64&domain=${d}">
          ${f.name}
        </a>
        <button class="delete-btn" onclick="removeFavorite(${i})">X</button>
      </div>`;
  });
}

function addCustom(){
  let name=document.getElementById("customName").value;
  let url=document.getElementById("customUrl").value;
  if(!name||!url)return;
  if(!url.startsWith("http"))url="https://"+url;
  favorites.push({name,url});
  localStorage.setItem("favorites",JSON.stringify(favorites));
  renderFavorites();
}

function removeFavorite(i){
  favorites.splice(i,1);
  localStorage.setItem("favorites",JSON.stringify(favorites));
  renderFavorites();
}

function handleSearch(e,val){
  if(e.key==="Enter"){
    if(val.startsWith("http")){
      window.open(val,'_blank');
    }else{
      window.open('https://www.google.com/search?q='+val,'_blank');
    }
  }
}

renderFavorites();
</script>

</body>
</html>
